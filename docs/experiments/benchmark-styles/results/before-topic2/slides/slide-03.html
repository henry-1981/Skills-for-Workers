<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #FAFAFA;
    color: #1A1A1A;
  }
  .container {
    width: 100%; height: 100%;
    padding: 120px 160px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .left h1 {
    font-size: 44px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -1px;
    margin-bottom: 24px;
  }
  .left p {
    font-size: 20px;
    font-weight: 400;
    line-height: 1.6;
    color: #666;
  }
  .right {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .channel {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .channel-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .channel-name {
    font-size: 18px;
    font-weight: 500;
    color: #999;
  }
  .channel-value {
    font-size: 36px;
    font-weight: 800;
  }
  .channel-value.up { color: #1A1A1A; }
  .channel-value.flat { color: #CCCCCC; }
  .divider {
    height: 1px;
    background: #E0E0E0;
  }
  .channel-desc {
    font-size: 16px;
    color: #999;
  }
  .accent { color: #E53E3E; }
</style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h1>오프라인은<br>제자리걸음이다</h1>
      <p>온라인이 올라간 만큼<br>오프라인의 정체가 더 도드라진다.<br><span class="accent">다음 분기의 최대 리스크</span></p>
    </div>
    <div class="right">
      <div class="channel">
        <div class="channel-header">
          <span class="channel-name">온라인</span>
          <span class="channel-value up">+35%</span>
        </div>
        <span class="channel-desc">급증</span>
      </div>
      <div class="divider"></div>
      <div class="channel">
        <div class="channel-header">
          <span class="channel-name">오프라인</span>
          <span class="channel-value flat">±0%</span>
        </div>
        <span class="channel-desc">보합 — 성장 부재</span>
      </div>
    </div>
  </div>
</body>
</html>
