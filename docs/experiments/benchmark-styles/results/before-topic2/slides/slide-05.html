<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #FAFAFA;
    color: #1A1A1A;
  }
  .container {
    width: 100%; height: 100%;
    padding: 120px 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 48px;
  }
  h1 {
    font-size: 44px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -1px;
  }
  .gap-visual {
    display: flex;
    align-items: flex-end;
    gap: 60px;
    height: 320px;
  }
  .column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .bar {
    width: 120px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 16px;
  }
  .bar-current {
    background: #E8E8E8;
    height: 200px;
  }
  .bar-target {
    background: #1A1A1A;
    height: 280px;
  }
  .bar-online-only {
    background: #E53E3E;
    height: 280px;
    opacity: 0.3;
    border: 2px dashed #E53E3E;
  }
  .bar span {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
  }
  .bar-current span { color: #999; }
  .bar-online-only span { color: #E53E3E; }
  .col-label {
    font-size: 16px;
    font-weight: 500;
    color: #999;
    text-align: center;
  }
  .insight {
    font-size: 22px;
    font-weight: 400;
    line-height: 1.6;
    color: #666;
    max-width: 800px;
  }
  .accent { color: #E53E3E; font-weight: 600; }
</style>
</head>
<body>
  <div class="container">
    <h1>다음 분기 15% — 오프라인 없이는 달성 불가</h1>
    <div class="gap-visual">
      <div class="column">
        <div class="bar bar-current"><span>12%</span></div>
        <span class="col-label">이번 분기<br>실적</span>
      </div>
      <div class="column">
        <div class="bar bar-target"><span>15%</span></div>
        <span class="col-label">다음 분기<br>목표</span>
      </div>
      <div class="column">
        <div class="bar bar-online-only"><span>50%+</span></div>
        <span class="col-label">온라인만으로<br>필요한 성장</span>
      </div>
    </div>
    <p class="insight">
      <span class="accent">오프라인 회복 없이 15% 달성은 비현실적</span>
    </p>
  </div>
</body>
</html>
