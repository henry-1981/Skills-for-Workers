<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #1A1A1A;
    color: #FAFAFA;
  }
  .container {
    width: 100%; height: 100%;
    padding: 120px 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 64px;
  }
  h1 {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -1px;
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }
  .action-card {
    border: 1px solid #333;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .action-number {
    font-size: 14px;
    font-weight: 500;
    color: #E53E3E;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .action-title {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.3;
  }
  .action-deadline {
    font-size: 16px;
    font-weight: 400;
    color: #999;
  }
  .bottom-line {
    font-size: 18px;
    color: #666;
    border-top: 1px solid #333;
    padding-top: 24px;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>지금 결정해야 할 것</h1>
    <div class="actions">
      <div class="action-card">
        <span class="action-number">Action 01</span>
        <span class="action-title">오프라인 회복 전략 확정</span>
        <span class="action-deadline">이번 주 내 의사결정</span>
      </div>
      <div class="action-card">
        <span class="action-number">Action 02</span>
        <span class="action-title">신제품 2차 투자 승인</span>
        <span class="action-deadline">다음 분기 초 실행 착수</span>
      </div>
    </div>
    <p class="bottom-line">두 가지 의사결정이 15% 목표의 80%를 좌우한다</p>
  </div>
</body>
</html>
