<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #FAFAFA;
    color: #1A1A1A;
  }
  .container {
    width: 100%; height: 100%;
    padding: 120px 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 60px;
  }
  h1 {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -1px;
  }
  .bar-section {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .bar-label {
    font-size: 20px;
    font-weight: 500;
    width: 120px;
    text-align: right;
    color: #666;
  }
  .bar-track {
    flex: 1;
    height: 48px;
    background: #ECECEC;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    background: #1A1A1A;
    display: flex;
    align-items: center;
    padding-left: 16px;
  }
  .bar-fill.highlight {
    background: #E53E3E;
  }
  .bar-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  .bar-context {
    font-size: 16px;
    font-weight: 400;
    color: #999;
    margin-left: 16px;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>온라인이 전체 성장을 견인했다</h1>
    <div class="bar-section">
      <div class="bar-row">
        <span class="bar-label">온라인</span>
        <div class="bar-track">
          <div class="bar-fill highlight" style="width: 85%;">
            <span class="bar-value">+35%</span>
            <span class="bar-context" style="color:rgba(255,255,255,0.7)">성장의 핵심 동력</span>
          </div>
        </div>
      </div>
      <div class="bar-row">
        <span class="bar-label">전체</span>
        <div class="bar-track">
          <div class="bar-fill" style="width: 40%;">
            <span class="bar-value">+12%</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
