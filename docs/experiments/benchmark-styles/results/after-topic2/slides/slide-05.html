<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #FFFFFF;
    color: #111111;
  }
  .red-bar {
    position: absolute;
    left: 0; top: 0;
    width: 8px; height: 100%;
    background: #E8000D;
  }
  .container {
    width: 100%; height: 100%;
    padding: 120px 160px 80px 200px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: auto 1px 1fr;
  }
  .title-area {
    grid-column: 1 / -1;
    grid-row: 1;
    padding-bottom: 40px;
  }
  h1 {
    font-size: 40px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5px;
  }
  .divider {
    grid-column: 1 / -1;
    grid-row: 2;
    background: #DDDDDD;
    height: 1px;
  }
  .content-area {
    grid-column: 1 / -1;
    grid-row: 3;
    padding-top: 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
    align-items: end;
  }
  .column-chart {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .bar-wrapper {
    width: 120px;
    height: 320px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .bar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bar.current {
    background: #F5F5F5;
    height: 200px;
    border-top: 2px solid #DDDDDD;
  }
  .bar.target {
    background: #111111;
    height: 260px;
  }
  .bar.impossible {
    height: 320px;
    background: transparent;
    border: 2px dashed #E8000D;
  }
  .bar span {
    font-size: 28px;
    font-weight: 800;
  }
  .bar.current span { color: #444444; }
  .bar.target span { color: #FFFFFF; }
  .bar.impossible span { color: #E8000D; }
  .col-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #444444;
    text-align: center;
  }
  .col-sublabel {
    font-size: 13px;
    color: #444444;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="red-bar"></div>
  <div class="container">
    <div class="title-area">
      <h1>다음 분기 15% — 오프라인 없이는 달성 불가</h1>
    </div>
    <div class="divider"></div>
    <div class="content-area">
      <div class="column-chart">
        <div class="bar-wrapper">
          <div class="bar current"><span>12%</span></div>
        </div>
        <span class="col-label">이번 분기</span>
        <span class="col-sublabel">실적</span>
      </div>
      <div class="column-chart">
        <div class="bar-wrapper">
          <div class="bar target"><span>15%</span></div>
        </div>
        <span class="col-label">다음 분기</span>
        <span class="col-sublabel">목표</span>
      </div>
      <div class="column-chart">
        <div class="bar-wrapper">
          <div class="bar impossible"><span>50%+</span></div>
        </div>
        <span class="col-label">온라인만</span>
        <span class="col-sublabel">비현실적</span>
      </div>
    </div>
  </div>
</body>
</html>
