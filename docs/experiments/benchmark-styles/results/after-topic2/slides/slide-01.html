<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #FFFFFF;
    color: #111111;
  }
  .red-bar {
    position: absolute;
    left: 0; top: 0;
    width: 8px; height: 100%;
    background: #E8000D;
  }
  .container {
    width: 100%; height: 100%;
    padding: 120px 160px 80px 200px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: auto 1px 1fr auto;
    gap: 0;
  }
  .title-area {
    grid-column: 1 / 5;
    grid-row: 1;
    padding-bottom: 48px;
  }
  h1 {
    font-size: 44px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5px;
    color: #111111;
  }
  .divider {
    grid-column: 1 / -1;
    grid-row: 2;
    background: #DDDDDD;
    height: 1px;
  }
  .content-area {
    grid-column: 1 / 4;
    grid-row: 3;
    padding-top: 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
  }
  .hero-number {
    font-size: 180px;
    font-weight: 900;
    letter-spacing: -6px;
    line-height: 1;
    color: #111111;
  }
  .hero-number span {
    font-size: 72px;
    font-weight: 400;
    letter-spacing: 0;
    color: #444444;
  }
  .sub-message {
    font-size: 22px;
    font-weight: 400;
    line-height: 1.5;
    color: #444444;
    max-width: 600px;
  }
  .sub-message strong {
    color: #E8000D;
    font-weight: 600;
  }
  .accent-circle {
    grid-column: 5;
    grid-row: 3 / 5;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding-bottom: 40px;
  }
  .circle {
    width: 80px; height: 80px;
    border: 2px solid #E8000D;
    border-radius: 50%;
  }
  .footer {
    grid-column: 1 / 4;
    grid-row: 4;
    padding-top: 24px;
  }
  .footer span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #444444;
  }
</style>
</head>
<body>
  <div class="red-bar"></div>
  <div class="container">
    <div class="title-area">
      <h1>목표를 넘었지만,<br>이 숫자만 보면 안 된다</h1>
    </div>
    <div class="divider"></div>
    <div class="content-area">
      <div class="hero-number">12<span>%</span></div>
      <p class="sub-message">
        2분기 매출 전년 대비 12% 성장<br>
        <strong>채널별 명암이 극명하다</strong>
      </p>
    </div>
    <div class="accent-circle"><div class="circle"></div></div>
    <div class="footer">
      <span>2분기 매출 실적 보고</span>
    </div>
  </div>
</body>
</html>
