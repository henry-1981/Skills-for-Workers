<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #FFFFFF;
    color: #111111;
  }
  .red-bar {
    position: absolute;
    left: 0; top: 0;
    width: 8px; height: 100%;
    background: #E8000D;
  }
  .container {
    width: 100%; height: 100%;
    padding: 120px 160px 80px 200px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: auto 1px 1fr auto;
  }
  .title-area {
    grid-column: 1 / -1;
    grid-row: 1;
    padding-bottom: 40px;
  }
  h1 {
    font-size: 44px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5px;
  }
  .divider {
    grid-column: 1 / -1;
    grid-row: 2;
    background: #DDDDDD;
    height: 1px;
  }
  .content-area {
    grid-column: 1 / -1;
    grid-row: 3;
    padding-top: 48px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 100px 1fr 80px;
    align-items: center;
    gap: 24px;
  }
  .bar-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #444444;
    text-align: right;
  }
  .bar-track {
    height: 56px;
    background: #F5F5F5;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    display: flex;
    align-items: center;
    padding-left: 20px;
  }
  .bar-fill.primary {
    background: #E8000D;
  }
  .bar-fill.secondary {
    background: #111111;
  }
  .bar-fill span {
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
  }
  .bar-context {
    font-size: 13px;
    font-weight: 400;
    color: #444444;
  }
  .footer {
    grid-column: 1 / -1;
    grid-row: 4;
    padding-top: 24px;
    border-top: 1px solid #DDDDDD;
  }
  .footer span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #444444;
  }
</style>
</head>
<body>
  <div class="red-bar"></div>
  <div class="container">
    <div class="title-area">
      <h1>온라인이 전체 성장을 견인했다</h1>
    </div>
    <div class="divider"></div>
    <div class="content-area">
      <div class="bar-row">
        <span class="bar-label">Online</span>
        <div class="bar-track">
          <div class="bar-fill primary" style="width: 85%;">
            <span>+35%</span>
          </div>
        </div>
        <span class="bar-context">핵심 동력</span>
      </div>
      <div class="bar-row">
        <span class="bar-label">Total</span>
        <div class="bar-track">
          <div class="bar-fill secondary" style="width: 40%;">
            <span>+12%</span>
          </div>
        </div>
        <span class="bar-context">전체 실적</span>
      </div>
    </div>
    <div class="footer">
      <span>채널별 성장률 비교</span>
    </div>
  </div>
</body>
</html>
