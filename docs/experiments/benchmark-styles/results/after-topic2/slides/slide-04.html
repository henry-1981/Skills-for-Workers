<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #FFFFFF;
    color: #111111;
  }
  .red-bar {
    position: absolute;
    left: 0; top: 0;
    width: 8px; height: 100%;
    background: #E8000D;
  }
  .container {
    width: 100%; height: 100%;
    padding: 120px 160px 80px 200px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: auto 1px 1fr auto;
  }
  .title-area {
    grid-column: 1 / -1;
    grid-row: 1;
    padding-bottom: 40px;
  }
  h1 {
    font-size: 44px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5px;
  }
  .divider {
    grid-column: 1 / -1;
    grid-row: 2;
    background: #DDDDDD;
    height: 1px;
  }
  .content-area {
    grid-column: 1 / -1;
    grid-row: 3;
    padding-top: 48px;
    display: flex;
    flex-direction: column;
    gap: 40px;
    justify-content: center;
  }
  .ratio-container {
    display: flex;
    height: 64px;
    width: 100%;
  }
  .ratio-new {
    width: 18%;
    background: #E8000D;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .ratio-new span {
    font-size: 24px;
    font-weight: 800;
    color: #FFFFFF;
  }
  .ratio-existing {
    width: 82%;
    background: #F5F5F5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .ratio-existing span {
    font-size: 20px;
    font-weight: 500;
    color: #444444;
  }
  .labels {
    display: flex;
    gap: 0;
  }
  .label-new {
    width: 18%;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #E8000D;
  }
  .label-existing {
    width: 82%;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #444444;
  }
  .insight {
    font-size: 20px;
    font-weight: 400;
    line-height: 1.6;
    color: #444444;
    max-width: 700px;
  }
  .insight strong {
    color: #111111;
    font-weight: 700;
  }
  .footer {
    grid-column: 1 / -1;
    grid-row: 4;
    padding-top: 24px;
    border-top: 1px solid #DDDDDD;
  }
  .footer span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #444444;
  }
</style>
</head>
<body>
  <div class="red-bar"></div>
  <div class="container">
    <div class="title-area">
      <h1>신제품이 예상 밖 기여를 했다</h1>
    </div>
    <div class="divider"></div>
    <div class="content-area">
      <div class="labels">
        <span class="label-new">신제품</span>
        <span class="label-existing">기존 제품군</span>
      </div>
      <div class="ratio-container">
        <div class="ratio-new"><span>18%</span></div>
        <div class="ratio-existing"><span>82%</span></div>
      </div>
      <p class="insight">
        신제품 라인이 전체 매출의 <strong>18%를 기여</strong> —<br>
        기존 제품군만으로는 12% 성장이 불가능했다
      </p>
    </div>
    <div class="footer">
      <span>매출 구성 비율</span>
    </div>
  </div>
</body>
</html>
