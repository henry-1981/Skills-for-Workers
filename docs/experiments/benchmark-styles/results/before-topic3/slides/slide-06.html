<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Slide 06 — 예산 60/40 비율</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: 'Pretendard', 'Inter', sans-serif;
    position: relative;
  }

  /* Split: 60% left (digital) dark, 40% right (offline) light */
  .split-digital {
    position: absolute;
    left: 0; top: 0;
    width: 1152px; /* 60% of 1920 */
    height: 1080px;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 100px;
  }

  .split-offline {
    position: absolute;
    right: 0; top: 0;
    width: 768px; /* 40% of 1920 */
    height: 1080px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px;
  }

  /* Divider line */
  .divider {
    position: absolute;
    left: 1148px; top: 0;
    width: 8px;
    height: 100%;
    background: #FF1A1A;
    z-index: 10;
  }

  /* Label */
  .section-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .split-digital .section-label { color: #FF1A1A; }
  .split-offline .section-label { color: #FF1A1A; }

  /* Giant percentage */
  .pct {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.05em;
  }
  .split-digital .pct {
    font-size: 380px;
    color: #f0f0f0;
  }
  .split-offline .pct {
    font-size: 280px;
    color: #0a0a0a;
  }

  .channel-name {
    font-family: 'Pretendard', sans-serif;
    font-weight: 900;
    letter-spacing: -0.02em;
    margin-top: 8px;
  }
  .split-digital .channel-name {
    font-size: 64px;
    color: #FF1A1A;
  }
  .split-offline .channel-name {
    font-size: 48px;
    color: #FF1A1A;
  }

  .channel-role {
    font-family: 'Pretendard', sans-serif;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.6;
    margin-top: 32px;
  }
  .split-digital .channel-role { color: #666; }
  .split-offline .channel-role { color: #666; }

  .channel-items {
    list-style: none;
    margin-top: 28px;
  }
  .channel-items li {
    font-family: 'Pretendard', sans-serif;
    font-size: 18px;
    font-weight: 400;
    line-height: 2.0;
    padding-left: 20px;
    position: relative;
  }
  .channel-items li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: #FF1A1A;
  }
  .split-digital .channel-items li { color: #888; }
  .split-offline .channel-items li { color: #555; }

  /* Top decorative labels */
  .label-top {
    position: absolute;
    top: 54px;
    left: 80px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #FF1A1A;
    z-index: 20;
  }
  .slide-num {
    position: absolute;
    top: 54px;
    right: 80px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 100;
    letter-spacing: 0.2em;
    color: #888;
    z-index: 20;
  }

  /* Bottom takeaway bar */
  .takeaway-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #FF1A1A;
    padding: 22px 80px;
    z-index: 20;
  }
  .takeaway-text {
    font-family: 'Pretendard', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: #fff;
    line-height: 1.5;
    letter-spacing: -0.01em;
  }

  /* Background ghost text */
  .ghost-digital {
    position: absolute;
    bottom: 80px;
    left: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 280px;
    font-weight: 900;
    color: rgba(255,26,26,0.05);
    line-height: 1;
    pointer-events: none;
    user-select: none;
    text-transform: uppercase;
    letter-spacing: -0.04em;
  }
  .ghost-offline {
    position: absolute;
    top: 80px;
    right: -20px;
    font-family: 'Inter', sans-serif;
    font-size: 200px;
    font-weight: 900;
    color: rgba(0,0,0,0.06);
    line-height: 1;
    pointer-events: none;
    user-select: none;
    text-transform: uppercase;
    letter-spacing: -0.04em;
  }
</style>
</head>
<body>
  <div class="label-top">VOKE Brand Strategy 2026 — Budget</div>
  <div class="slide-num">06 / 07</div>

  <div class="split-digital">
    <div class="ghost-digital">DIG</div>
    <div class="section-label">Digital Channel</div>
    <div class="pct">60%</div>
    <div class="channel-name">디지털</div>
    <div class="channel-role">MZ 도달 — 넓고 빠르게</div>
    <ul class="channel-items">
      <li>인스타그램 콘텐츠 · 릴스 광고</li>
      <li>유튜브 쇼츠 제작 · 배포</li>
      <li>인플루언서 20명 파트너십 피</li>
    </ul>
  </div>

  <div class="divider"></div>

  <div class="split-offline">
    <div class="ghost-offline">OFF</div>
    <div class="section-label">Offline Channel</div>
    <div class="pct">40%</div>
    <div class="channel-name">오프라인</div>
    <div class="channel-role">기억 각인 — 깊고 오래</div>
    <ul class="channel-items">
      <li>팝업스토어 3곳 운영비</li>
      <li>현장 콘텐츠 제작</li>
      <li>체험 이벤트 · 굿즈</li>
    </ul>
  </div>

  <div class="takeaway-bar">
    <div class="takeaway-text">디지털 60% / 오프라인 40% — MZ 도달은 디지털, 기억 각인은 오프라인</div>
  </div>
</body>
</html>
