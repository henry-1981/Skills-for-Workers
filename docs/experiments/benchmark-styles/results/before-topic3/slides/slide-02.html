<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Slide 02 — 채널 집중 전략</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #f5f5f5;
    color: #0a0a0a;
    font-family: 'Pretendard', 'Inter', sans-serif;
    position: relative;
  }

  /* Left half — Instagram (dark) */
  .half-left {
    position: absolute;
    left: 0; top: 0;
    width: 960px;
    height: 1080px;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 72px 80px;
  }

  /* Right half — YouTube Shorts (light) */
  .half-right {
    position: absolute;
    right: 0; top: 0;
    width: 960px;
    height: 1080px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 72px 80px;
  }

  /* Red divider */
  .divider {
    position: absolute;
    left: 956px; top: 0;
    width: 8px;
    height: 100%;
    background: #FF1A1A;
    z-index: 10;
  }

  /* Platform label */
  .platform-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .platform-label.light { color: #FF1A1A; }
  .platform-label.dark { color: #FF1A1A; }

  /* Platform name — giant */
  .platform-name {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 128px;
    line-height: 0.9;
    letter-spacing: -0.04em;
    text-transform: uppercase;
  }
  .platform-name.on-dark { color: #f0f0f0; }
  .platform-name.on-light { color: #0a0a0a; }

  .platform-sub {
    font-family: 'Pretendard', sans-serif;
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -0.02em;
    margin-top: 8px;
  }
  .platform-sub.on-dark { color: #FF1A1A; }
  .platform-sub.on-light { color: #FF1A1A; }

  .platform-desc {
    font-family: 'Pretendard', sans-serif;
    font-size: 18px;
    font-weight: 400;
    line-height: 1.65;
    margin-top: 32px;
  }
  .platform-desc.on-dark { color: #888; }
  .platform-desc.on-light { color: #555; }

  /* Top label */
  .label-top {
    position: absolute;
    top: 54px;
    left: 80px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #FF1A1A;
    z-index: 20;
  }

  /* Slide number */
  .slide-num {
    position: absolute;
    top: 54px;
    right: 80px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 100;
    letter-spacing: 0.2em;
    color: #888;
    z-index: 20;
  }

  /* Takeaway bar — bottom spanning */
  .takeaway-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #FF1A1A;
    padding: 22px 80px;
    z-index: 20;
  }
  .takeaway-bar-text {
    font-family: 'Pretendard', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: #fff;
    line-height: 1.5;
    letter-spacing: -0.01em;
  }

  /* Focus word background */
  .bg-word-left {
    position: absolute;
    top: 100px;
    left: 40px;
    font-family: 'Inter', sans-serif;
    font-size: 360px;
    font-weight: 900;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    pointer-events: none;
    user-select: none;
    text-transform: uppercase;
  }
  .bg-word-right {
    position: absolute;
    top: 100px;
    right: -20px;
    font-family: 'Inter', sans-serif;
    font-size: 360px;
    font-weight: 900;
    color: rgba(0,0,0,0.05);
    line-height: 1;
    pointer-events: none;
    user-select: none;
    text-transform: uppercase;
  }

  /* VS badge */
  .vs-badge {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    background: #FF1A1A;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="label-top">VOKE Brand Strategy 2026</div>
  <div class="slide-num">02 / 07</div>

  <div class="half-left">
    <div class="bg-word-left">IG</div>
    <div class="platform-label dark">Channel 01</div>
    <div class="platform-name on-dark">INSTA-<br>GRAM</div>
    <div class="platform-sub on-dark">비주얼 정체성</div>
    <div class="platform-desc on-dark">이미지 · 릴스 · 스토리<br>브랜드 세계관의 1차 거점</div>
  </div>

  <div class="divider"></div>
  <div class="vs-badge">VS</div>

  <div class="half-right">
    <div class="bg-word-right">YT</div>
    <div class="platform-label light">Channel 02</div>
    <div class="platform-name on-light">YOUTUBE<br>SHORTS</div>
    <div class="platform-sub on-light">바이럴 엔진</div>
    <div class="platform-desc on-light">60초 이하 · 알고리즘 도달<br>신규 오디언스 폭발적 확장</div>
  </div>

  <div class="takeaway-bar">
    <div class="takeaway-bar-text">인스타그램 + 유튜브 쇼츠 — MZ의 체류 시간이 가장 긴 두 채널에 집중한다</div>
  </div>
</body>
</html>
