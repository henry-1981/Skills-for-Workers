<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Slide 03 — 인플루언서 20명 파트너십</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: 'Pretendard', 'Inter', sans-serif;
    position: relative;
  }

  /* Giant number background */
  .bg-number {
    position: absolute;
    right: -40px;
    top: -80px;
    font-family: 'Inter', sans-serif;
    font-size: 680px;
    font-weight: 900;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px rgba(255,26,26,0.2);
    pointer-events: none;
    user-select: none;
    letter-spacing: -0.08em;
  }

  /* Left panel */
  .left-panel {
    position: absolute;
    left: 80px;
    top: 0;
    width: 700px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 0;
  }

  .top-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #FF1A1A;
    margin-bottom: 32px;
  }

  /* BIG 20 */
  .number-20 {
    font-family: 'Inter', sans-serif;
    font-size: 320px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.06em;
    color: #FF1A1A;
    display: block;
  }

  .number-unit {
    font-family: 'Pretendard', sans-serif;
    font-size: 64px;
    font-weight: 900;
    color: #f0f0f0;
    letter-spacing: -0.02em;
    display: block;
    margin-top: 12px;
  }

  .desc {
    font-family: 'Pretendard', sans-serif;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.7;
    color: #888;
    margin-top: 36px;
    max-width: 480px;
  }

  /* Right distributed nodes */
  .nodes-area {
    position: absolute;
    right: 80px;
    top: 120px;
    width: 880px;
    height: 820px;
  }

  .node {
    position: absolute;
    border: 1px solid #333;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .node-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 6px;
  }
  .node-val {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #f0f0f0;
    letter-spacing: -0.02em;
  }

  /* Connector lines via pseudo elements — simplified via divs */
  .connector {
    position: absolute;
    background: rgba(255,26,26,0.25);
    transform-origin: left center;
  }

  /* Takeaway bottom */
  .takeaway-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    border-top: 4px solid #FF1A1A;
    background: #111;
    padding: 24px 80px;
  }
  .takeaway-text {
    font-family: 'Pretendard', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: #d0d0d0;
    line-height: 1.5;
    letter-spacing: -0.01em;
  }

  .slide-num {
    position: absolute;
    top: 54px;
    right: 80px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 100;
    letter-spacing: 0.2em;
    color: #444;
  }
</style>
</head>
<body>
  <div class="bg-number">20</div>
  <div class="slide-num">03 / 07</div>

  <div class="left-panel">
    <div class="top-label">Partnership Strategy</div>
    <span class="number-20">20</span>
    <span class="number-unit">인플루언서</span>
    <div class="desc">
      마이크로·매크로 혼합<br>
      팔로워보다 진정성<br>
      VOKE 세계관과 결이 맞는 목소리
    </div>
  </div>

  <!-- Distributed node layout: asymmetric scatter -->
  <div class="nodes-area">
    <!-- Row 1 -->
    <div class="node" style="left:0px; top:0px; width:220px; height:110px;">
      <div class="node-label">Tier A</div>
      <div class="node-val">5명</div>
    </div>
    <div class="node" style="left:280px; top:40px; width:160px; height:90px; border-color:#FF1A1A;">
      <div class="node-label" style="color:#FF1A1A;">Core</div>
      <div class="node-val" style="color:#FF1A1A;">매크로</div>
    </div>
    <div class="node" style="left:500px; top:0px; width:180px; height:100px;">
      <div class="node-label">100K+</div>
      <div class="node-val">팔로워</div>
    </div>
    <!-- Row 2 -->
    <div class="node" style="left:60px; top:180px; width:140px; height:85px;">
      <div class="node-label">Tier B</div>
      <div class="node-val">9명</div>
    </div>
    <div class="node" style="left:260px; top:200px; width:200px; height:95px; border-color:#FF1A1A;">
      <div class="node-label" style="color:#FF1A1A;">Mid-tier</div>
      <div class="node-val" style="color:#FF1A1A;">마이크로</div>
    </div>
    <div class="node" style="left:520px; top:170px; width:175px; height:90px;">
      <div class="node-label">10K-100K</div>
      <div class="node-val">팔로워</div>
    </div>
    <div class="node" style="left:740px; top:195px; width:135px; height:80px;">
      <div class="node-label">Eng.</div>
      <div class="node-val">8%+</div>
    </div>
    <!-- Row 3 -->
    <div class="node" style="left:0px; top:360px; width:160px; height:85px;">
      <div class="node-label">Tier C</div>
      <div class="node-val">6명</div>
    </div>
    <div class="node" style="left:220px; top:380px; width:195px; height:90px; border-color:#555;">
      <div class="node-label">Nano</div>
      <div class="node-val">나노</div>
    </div>
    <div class="node" style="left:470px; top:360px; width:170px; height:85px;">
      <div class="node-label">1K-10K</div>
      <div class="node-val">팔로워</div>
    </div>
    <div class="node" style="left:695px; top:375px; width:175px; height:85px;">
      <div class="node-label">Auth.</div>
      <div class="node-val">최우선</div>
    </div>
    <!-- Row 4 -->
    <div class="node" style="left:100px; top:530px; width:300px; height:95px; border-color:#FF1A1A; background:#1a0a0a;">
      <div class="node-label" style="color:#FF1A1A;">Selection Criterion</div>
      <div class="node-val" style="font-size:22px; color:#FF1A1A;">브랜드 핏 &gt; 팔로워 수</div>
    </div>
    <div class="node" style="left:460px; top:540px; width:250px; height:90px;">
      <div class="node-label">Contract</div>
      <div class="node-val" style="font-size:22px;">6개월 파트너</div>
    </div>
    <div class="node" style="left:760px; top:545px; width:115px; height:80px;">
      <div class="node-label">Format</div>
      <div class="node-val" style="font-size:20px;">콘텐츠 자율</div>
    </div>
  </div>

  <div class="takeaway-bar">
    <div class="takeaway-text">인플루언서 20명 파트너십 — 브랜드가 아니라 사람이 먼저 말한다</div>
  </div>
</body>
</html>
