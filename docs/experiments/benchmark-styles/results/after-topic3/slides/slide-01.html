<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Slide 01 - Neo-Brutalism</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-color: #CCFF00;
    font-family: 'Space Mono', monospace;
  }

  .canvas {
    width: 1920px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .label-top {
    position: absolute;
    top: 52px;
    left: 80px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: #000000;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .slide-number {
    position: absolute;
    top: 48px;
    right: 80px;
    font-family: Arial Black, Impact, sans-serif;
    font-size: 86px;
    color: #000000;
    opacity: 0.08;
    line-height: 1;
  }

  .hero-card {
    background: #FFFFFF;
    border: 5px solid #000000;
    box-shadow: 10px 10px 0px #000000;
    padding: 70px 90px;
    max-width: 1400px;
    width: 100%;
    position: relative;
    transform: rotate(-0.5deg);
  }

  .hero-keyword {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 120px;
    color: #000000;
    line-height: 1;
    letter-spacing: -2px;
    display: block;
    margin-bottom: 20px;
  }

  .hero-keyword span.accent {
    color: #FF3B30;
    display: inline-block;
    transform: rotate(1deg);
  }

  .divider {
    width: 100%;
    height: 5px;
    background: #000000;
    margin: 32px 0;
  }

  .takeaway {
    font-family: 'Space Mono', monospace;
    font-size: 19px;
    color: #000000;
    line-height: 1.7;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .badge {
    position: absolute;
    bottom: -5px;
    right: -5px;
    background: #FF3B30;
    border: 4px solid #000000;
    color: #000000;
    font-family: Arial Black, sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    padding: 10px 20px;
    text-transform: uppercase;
    font-weight: 900;
  }

  .corner-block {
    position: absolute;
    bottom: 60px;
    left: 80px;
    background: #000000;
    width: 60px;
    height: 60px;
    border: 4px solid #000000;
    box-shadow: 5px 5px 0px #FF3B30;
  }

  .voke-label {
    position: absolute;
    bottom: 66px;
    left: 160px;
    font-family: Arial Black, sans-serif;
    font-size: 22px;
    color: #000000;
    font-weight: 900;
    letter-spacing: 5px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="label-top">VOKE BRAND STRATEGY — TOPIC 3</div>
  <div class="slide-number">01</div>

  <div class="hero-card">
    <span class="hero-keyword">거침없는<br><span class="accent">진정성</span></span>
    <div class="divider"></div>
    <p class="takeaway">VOKE의 핵심 가치 '거침없는 진정성'은 MZ세대(25-35)가<br>브랜드에 요구하는 유일한 자격증이다</p>
    <div class="badge">CORE VALUE</div>
  </div>

  <div class="corner-block"></div>
  <div class="voke-label">VOKE</div>
</div>
</body>
</html>
