<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Slide 04 - Neo-Brutalism</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-color: #FFFFFF;
    font-family: 'Space Mono', monospace;
  }

  .canvas {
    width: 1920px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 52px;
  }

  .label-top {
    position: absolute;
    top: 52px;
    left: 80px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: #000000;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .slide-number {
    position: absolute;
    top: 48px;
    right: 80px;
    font-family: Arial Black, Impact, sans-serif;
    font-size: 86px;
    color: #000000;
    opacity: 0.08;
    line-height: 1;
  }

  .section-headline {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 64px;
    color: #000000;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.1;
  }

  .section-headline span {
    color: #FF3B30;
  }

  .cards-row {
    display: flex;
    gap: 48px;
    align-items: stretch;
    width: 1680px;
  }

  .popup-card {
    flex: 1;
    background: #FFFFFF;
    border: 5px solid #000000;
    box-shadow: 8px 8px 0px #000000;
    padding: 52px 44px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .popup-number {
    font-family: Arial Black, Impact, sans-serif;
    font-size: 96px;
    color: #F5F500;
    line-height: 1;
    letter-spacing: -4px;
    background: #000000;
    display: inline-block;
    padding: 0 16px;
    align-self: flex-start;
  }

  .popup-location {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 44px;
    color: #000000;
    line-height: 1.2;
    letter-spacing: 1px;
  }

  .popup-accent-bar {
    width: 80px;
    height: 6px;
    background: #F5F500;
    border: 3px solid #000000;
  }

  .popup-desc {
    font-family: 'Space Mono', monospace;
    font-size: 17px;
    color: #000000;
    line-height: 1.7;
    font-weight: 700;
  }

  .card-badge {
    position: absolute;
    top: -5px;
    left: 32px;
    background: #F5F500;
    border: 4px solid #000000;
    font-family: Arial Black, sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: #000000;
    padding: 5px 14px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .takeaway-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #000000;
    border-top: 5px solid #000000;
    padding: 20px 80px;
  }

  .takeaway-text {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: #F5F500;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="label-top">VOKE BRAND STRATEGY — TOPIC 3</div>
  <div class="slide-number">04</div>

  <div class="section-headline">서울 팝업스토어 <span>3곳</span></div>

  <div class="cards-row">
    <!-- Card 1: 성수 -->
    <div class="popup-card">
      <div class="card-badge">POPUP 01</div>
      <div class="popup-number">01</div>
      <div class="popup-location">성수동</div>
      <div class="popup-accent-bar"></div>
      <div class="popup-desc">
        MZ 밀집 힙 클러스터.<br>
        브랜드 첫인상을<br>
        물리적으로 각인.
      </div>
    </div>

    <!-- Card 2: 홍대 -->
    <div class="popup-card">
      <div class="card-badge">POPUP 02</div>
      <div class="popup-number">02</div>
      <div class="popup-location">홍대입구</div>
      <div class="popup-accent-bar"></div>
      <div class="popup-desc">
        2030 주거 밀집 상권.<br>
        일상 접점에서<br>
        자연스러운 노출.
      </div>
    </div>

    <!-- Card 3: 강남 -->
    <div class="popup-card">
      <div class="card-badge">POPUP 03</div>
      <div class="popup-number">03</div>
      <div class="popup-location">강남역</div>
      <div class="popup-accent-bar"></div>
      <div class="popup-desc">
        유동인구 최고.<br>
        인플루언서 콘텐츠<br>
        촬영 허브 역할.
      </div>
    </div>
  </div>

  <div class="takeaway-bar">
    <span class="takeaway-text">서울 팝업스토어 3곳 — 디지털 브랜드가 물리적 경험을 만들 때 기억이 된다</span>
  </div>
</div>
</body>
</html>
