<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Slide 03 - Neo-Brutalism</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-color: #FFFFFF;
    font-family: 'Space Mono', monospace;
  }

  .canvas {
    width: 1920px;
    height: 1080px;
    position: relative;
  }

  .label-top {
    position: absolute;
    top: 52px;
    left: 80px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: #000000;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 10;
  }

  /* Oversized "20" breaking layout grid */
  .big-number {
    position: absolute;
    top: -30px;
    right: -20px;
    font-family: Arial Black, Impact, sans-serif;
    font-size: 480px;
    color: #CCFF00;
    line-height: 1;
    letter-spacing: -20px;
    z-index: 1;
    user-select: none;
    border: none;
  }

  /* Card 1 - tilted top-left */
  .card-1 {
    position: absolute;
    top: 140px;
    left: 80px;
    width: 500px;
    background: #000000;
    border: 5px solid #000000;
    box-shadow: 8px 8px 0px #FF3B30;
    padding: 44px 48px;
    transform: rotate(-1.5deg);
    z-index: 5;
  }

  .card-1 .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: #CCFF00;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .card-1 .card-title {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 52px;
    color: #FFFFFF;
    line-height: 1.1;
    margin-bottom: 20px;
  }

  .card-1 .card-body {
    font-family: 'Space Mono', monospace;
    font-size: 17px;
    color: #FFFFFF;
    line-height: 1.7;
  }

  /* Card 2 - center */
  .card-2 {
    position: absolute;
    top: 220px;
    left: 640px;
    width: 560px;
    background: #F5F500;
    border: 5px solid #000000;
    box-shadow: 10px 10px 0px #000000;
    padding: 44px 48px;
    transform: rotate(0.8deg);
    z-index: 5;
  }

  .card-2 .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: #000000;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .card-2 .card-title {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 48px;
    color: #000000;
    line-height: 1.1;
    margin-bottom: 20px;
  }

  .card-2 .card-body {
    font-family: 'Space Mono', monospace;
    font-size: 17px;
    color: #000000;
    line-height: 1.7;
    font-weight: 700;
  }

  /* Card 3 - bottom right */
  .card-3 {
    position: absolute;
    top: 500px;
    left: 280px;
    width: 520px;
    background: #FFFFFF;
    border: 5px solid #000000;
    box-shadow: 8px 8px 0px #0000FF;
    padding: 44px 48px;
    transform: rotate(1.2deg);
    z-index: 5;
  }

  .card-3 .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: #0000FF;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .card-3 .card-title {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 46px;
    color: #000000;
    line-height: 1.1;
    margin-bottom: 20px;
  }

  .card-3 .card-body {
    font-family: 'Space Mono', monospace;
    font-size: 17px;
    color: #000000;
    line-height: 1.7;
    font-weight: 700;
  }

  .takeaway-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #FF3B30;
    border-top: 5px solid #000000;
    padding: 20px 80px;
    z-index: 20;
  }

  .takeaway-text {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: #FFFFFF;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .number-label {
    position: absolute;
    top: 60px;
    right: 90px;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: #000000;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="label-top">VOKE BRAND STRATEGY — TOPIC 3</div>
  <div class="number-label">INFLUENCERS</div>

  <!-- Oversized 20 breaking layout -->
  <div class="big-number">20</div>

  <!-- Scattered cards -->
  <div class="card-1">
    <div class="card-label">STRATEGY</div>
    <div class="card-title">사람이<br>먼저<br>말한다</div>
    <div class="card-body">
      브랜드 광고가 아닌<br>
      진짜 사람의 언어로<br>
      신뢰를 쌓는다.
    </div>
  </div>

  <div class="card-2">
    <div class="card-label">PARTNERSHIP</div>
    <div class="card-title">인플루언서<br>20명</div>
    <div class="card-body">
      매크로 1명보다<br>
      마이크로 20명.<br>
      밀도 높은 커뮤니티<br>
      침투 전략.
    </div>
  </div>

  <div class="card-3">
    <div class="card-label">SELECTION RULE</div>
    <div class="card-title">진정성<br>우선</div>
    <div class="card-body">
      팔로워 수가 아니라<br>
      실제 커뮤니티 밀도와<br>
      VOKE 결 맞음으로<br>
      선발한다.
    </div>
  </div>

  <div class="takeaway-bar">
    <span class="takeaway-text">인플루언서 20명 파트너십 — 브랜드가 아니라 사람이 먼저 말한다</span>
  </div>
</div>
</body>
</html>
