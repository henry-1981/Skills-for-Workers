<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Slide 06 - Neo-Brutalism</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-color: #FFFFFF;
    font-family: 'Space Mono', monospace;
  }

  .canvas {
    width: 1920px;
    height: 1080px;
    position: relative;
    display: flex;
  }

  .label-top {
    position: absolute;
    top: 52px;
    left: 80px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: #000000;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 10;
  }

  /* Left panel: 60% DIGITAL — white background */
  .panel-left {
    width: 60%;
    background: #FFFFFF;
    border-right: 6px solid #000000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 80px 100px 80px;
    position: relative;
  }

  /* Right panel: 40% OFFLINE — black background */
  .panel-right {
    width: 40%;
    background: #000000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 72px 100px 72px;
    position: relative;
  }

  .panel-percent {
    font-family: Arial Black, Impact, sans-serif;
    font-size: 220px;
    line-height: 0.85;
    letter-spacing: -10px;
    display: block;
    margin-bottom: 12px;
  }

  .panel-left .panel-percent {
    color: #000000;
  }

  .panel-right .panel-percent {
    color: #CCFF00;
  }

  .panel-channel {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 64px;
    letter-spacing: 4px;
    display: block;
    margin-bottom: 28px;
    border-top: 5px solid;
    padding-top: 16px;
  }

  .panel-left .panel-channel {
    color: #000000;
    border-color: #000000;
  }

  .panel-right .panel-channel {
    color: #CCFF00;
    border-color: #CCFF00;
  }

  .panel-role {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 36px;
  }

  .panel-left .panel-role {
    color: #000000;
  }

  .panel-right .panel-role {
    color: #FFFFFF;
  }

  .detail-block {
    border: 4px solid;
    box-shadow: 6px 6px 0px;
    padding: 24px 28px;
  }

  .panel-left .detail-block {
    border-color: #000000;
    box-shadow-color: #000000;
    box-shadow: 6px 6px 0px #000000;
    background: #F5F500;
  }

  .panel-right .detail-block {
    border-color: #CCFF00;
    box-shadow: 6px 6px 0px #CCFF00;
    background: #000000;
  }

  .detail-items {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .detail-items li {
    font-family: 'Space Mono', monospace;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.4;
    padding-left: 20px;
    position: relative;
  }

  .detail-items li::before {
    content: '▶';
    position: absolute;
    left: 0;
    font-size: 11px;
    top: 3px;
  }

  .panel-left .detail-items li {
    color: #000000;
  }

  .panel-left .detail-items li::before {
    color: #FF3B30;
  }

  .panel-right .detail-items li {
    color: #FFFFFF;
  }

  .panel-right .detail-items li::before {
    color: #CCFF00;
  }

  /* VS divider badge */
  .vs-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #FF3B30;
    border: 5px solid #000000;
    box-shadow: 6px 6px 0px #000000;
    font-family: Arial Black, Impact, sans-serif;
    font-size: 32px;
    color: #FFFFFF;
    padding: 14px 20px;
    letter-spacing: 2px;
    font-weight: 900;
    z-index: 20;
  }

  .takeaway-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #F5F500;
    border-top: 5px solid #000000;
    padding: 20px 80px;
    z-index: 20;
  }

  .takeaway-text {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: #000000;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="label-top">VOKE BRAND STRATEGY — TOPIC 3</div>

  <!-- Left: Digital 60% -->
  <div class="panel-left">
    <span class="panel-percent">60%</span>
    <span class="panel-channel">DIGITAL</span>
    <p class="panel-role">
      MZ 도달의 핵심.<br>
      인스타그램 + 유튜브 쇼츠<br>
      + 인플루언서 콘텐츠
    </p>
    <div class="detail-block">
      <ul class="detail-items">
        <li>광범위한 인지도 확산</li>
        <li>알고리즘 기반 바이럴 증폭</li>
        <li>저비용 고효율 도달</li>
      </ul>
    </div>
  </div>

  <!-- Right: Offline 40% -->
  <div class="panel-right">
    <span class="panel-percent">40%</span>
    <span class="panel-channel">OFFLINE</span>
    <p class="panel-role">
      기억 각인의 핵심.<br>
      팝업스토어 3곳<br>
      + 체험형 이벤트
    </p>
    <div class="detail-block">
      <ul class="detail-items">
        <li>신체 감각으로 남는 기억</li>
        <li>SNS 자발 확산 콘텐츠 생성</li>
        <li>브랜드 세계관 물리적 구현</li>
      </ul>
    </div>
  </div>

  <!-- VS Badge -->
  <div class="vs-badge">+</div>

  <div class="takeaway-bar">
    <span class="takeaway-text">디지털 60% / 오프라인 40% — MZ 도달은 디지털, 기억 각인은 오프라인</span>
  </div>
</div>
</body>
</html>
