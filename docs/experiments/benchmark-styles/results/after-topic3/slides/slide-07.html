<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Slide 07 - Neo-Brutalism</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-color: #FFFFFF;
    font-family: 'Space Mono', monospace;
  }

  .canvas {
    width: 1920px;
    height: 1080px;
    position: relative;
    display: flex;
    align-items: center;
  }

  .label-top {
    position: absolute;
    top: 52px;
    left: 80px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: #000000;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 10;
  }

  /* Left: Oversized 40% */
  .kpi-left {
    width: 820px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 60px 100px 80px;
    position: relative;
    border-right: 6px solid #000000;
    height: 100%;
  }

  .kpi-label {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: #000000;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .kpi-big {
    font-family: Arial Black, Impact, sans-serif;
    font-size: 340px;
    color: #FF3B30;
    line-height: 0.85;
    letter-spacing: -12px;
    display: block;
    border-left: 12px solid #FF3B30;
    padding-left: 20px;
  }

  .kpi-metric {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 58px;
    color: #000000;
    letter-spacing: 3px;
    margin-top: 16px;
    display: block;
    border-top: 5px solid #000000;
    padding-top: 16px;
  }

  /* Right: Breakdown cards */
  .kpi-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 80px 100px 80px;
    gap: 28px;
  }

  .kpi-headline {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 52px;
    color: #000000;
    line-height: 1.15;
    margin-bottom: 8px;
  }

  .kpi-sub {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: #000000;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .metric-card {
    background: #FFFFFF;
    border: 5px solid #000000;
    box-shadow: 8px 8px 0px #000000;
    padding: 28px 32px;
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .metric-card.red-card {
    background: #FF3B30;
    box-shadow: 8px 8px 0px #000000;
  }

  .metric-num {
    font-family: Arial Black, Impact, sans-serif;
    font-size: 60px;
    color: #000000;
    line-height: 1;
    letter-spacing: -2px;
    min-width: 140px;
  }

  .metric-card.red-card .metric-num {
    color: #FFFFFF;
  }

  .metric-vbar {
    width: 5px;
    height: 56px;
    background: #000000;
    flex-shrink: 0;
  }

  .metric-card.red-card .metric-vbar {
    background: #FFFFFF;
  }

  .metric-text {
    flex: 1;
  }

  .metric-title {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 26px;
    color: #000000;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .metric-card.red-card .metric-title {
    color: #FFFFFF;
  }

  .metric-desc {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: #000000;
    font-weight: 700;
    line-height: 1.4;
  }

  .metric-card.red-card .metric-desc {
    color: #FFFFFF;
  }

  .sole-criterion {
    background: #000000;
    border: 5px solid #000000;
    padding: 16px 28px;
    font-family: 'Space Mono', monospace;
    font-size: 17px;
    color: #CCFF00;
    font-weight: 700;
    letter-spacing: 1px;
    line-height: 1.5;
  }

  .takeaway-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #FF3B30;
    border-top: 5px solid #000000;
    padding: 20px 80px;
    z-index: 20;
  }

  .takeaway-text {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: #FFFFFF;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="label-top">VOKE BRAND STRATEGY — TOPIC 3</div>

  <!-- Left: Big 40% -->
  <div class="kpi-left">
    <span class="kpi-label">TARGET KPI</span>
    <span class="kpi-big">40%</span>
    <span class="kpi-metric">브랜드 인지도</span>
  </div>

  <!-- Right: Breakdown -->
  <div class="kpi-right">
    <p class="kpi-headline">성공의<br>유일한 기준</p>
    <p class="kpi-sub">
      매출이 아니다. 팔로워가 아니다.<br>
      브랜드 인지도 40% — 이것 하나만 본다.
    </p>

    <div class="metric-card red-card">
      <span class="metric-num">40%</span>
      <div class="metric-vbar"></div>
      <div class="metric-text">
        <div class="metric-title">브랜드 인지도</div>
        <div class="metric-desc">MZ세대(25-35) 타깃 인지도 달성 목표</div>
      </div>
    </div>

    <div class="metric-card">
      <span class="metric-num">8W</span>
      <div class="metric-vbar"></div>
      <div class="metric-text">
        <div class="metric-title">측정 시점</div>
        <div class="metric-desc">론칭 8주 후 설문 + 소셜 리스닝</div>
      </div>
    </div>

    <div class="sole-criterion">
      ▶ 이것이 성공의 유일한 기준이다.<br>
      다른 지표는 참고용일 뿐.
    </div>
  </div>

  <div class="takeaway-bar">
    <span class="takeaway-text">KPI 브랜드 인지도 40% 달성 — 이것이 성공의 유일한 기준이다</span>
  </div>
</div>
</body>
</html>
