<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #0a0a0f;
    position: relative;
  }

  /* Diagonal split: warm left, cold right */
  .bg-split {
    position: absolute; inset: 0;
    background: linear-gradient(135deg,
      rgba(220, 38, 38, 0.06) 0%,
      transparent 40%,
      rgba(59, 130, 246, 0.04) 100%);
  }

  /* Single dramatic accent — not decorative, semantic: "warning" */
  .accent-bar {
    position: absolute; top: 0; left: 0;
    width: 8px; height: 100%;
    background: linear-gradient(180deg, #dc2626 0%, #dc2626 60%, transparent 100%);
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center;
    height: 100%;
    padding: 120px 140px;
  }

  .eyebrow {
    font-size: 15px; font-weight: 600; color: #dc2626;
    letter-spacing: 6px; text-transform: uppercase;
    margin-bottom: 40px;
  }

  h1 {
    font-size: 82px; font-weight: 800; line-height: 1.12;
    color: #f5f5f5;
    letter-spacing: -3px;
    margin-bottom: 48px;
    max-width: 1200px;
  }
  h1 .dim { color: rgba(245, 245, 245, 0.3); }
  h1 .red {
    color: #dc2626;
    text-decoration: underline;
    text-decoration-color: rgba(220, 38, 38, 0.3);
    text-underline-offset: 8px;
  }

  .provocation {
    font-size: 26px; font-weight: 400; color: rgba(245, 245, 245, 0.45);
    line-height: 1.7;
    max-width: 900px;
    border-left: 2px solid rgba(220, 38, 38, 0.3);
    padding-left: 28px;
  }

  /* Bottom: source + page */
  .bottom-bar {
    position: absolute; bottom: 48px; left: 140px; right: 140px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .source {
    font-size: 13px; font-weight: 400; color: rgba(245, 245, 245, 0.2);
  }
  .counter {
    font-size: 14px; color: rgba(245, 245, 245, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="bg-split"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="eyebrow">Uncomfortable Question</div>
    <h1>
      무료 AI 시대,<br>
      <span class="dim">당신의 직무 가치는</span><br>
      <span class="red">시급 $0.02</span><span class="dim">와 경쟁 중</span>
    </h1>
    <p class="provocation">
      GPT-4o 한 번 호출 비용이 $0.02 이하로 떨어졌습니다.<br>
      이것은 도구가 싸졌다는 이야기가 아닙니다.<br>
      당신이 하던 일의 시장 가격이 재설정되고 있다는 이야기입니다.
    </p>
  </div>

  <div class="bottom-bar">
    <span class="source">OpenAI API Pricing, March 2026 기준</span>
    <span class="counter">01 / 05</span>
  </div>
</body>
</html>
