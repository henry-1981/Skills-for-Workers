<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #0a0a0f;
    position: relative;
  }

  .accent-bar {
    position: absolute; top: 0; left: 0;
    width: 8px; height: 100%;
    background: linear-gradient(180deg, #3b82f6 0%, #3b82f6 80%, transparent 100%);
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center;
    height: 100%;
    padding: 120px 140px;
  }

  .section-label {
    font-size: 13px; font-weight: 600; color: #60a5fa;
    letter-spacing: 5px; text-transform: uppercase;
    margin-bottom: 40px;
  }

  h2 {
    font-size: 72px; font-weight: 800; color: #f5f5f5;
    letter-spacing: -2.5px; line-height: 1.15;
    margin-bottom: 48px;
    max-width: 1100px;
  }

  .two-futures {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    margin-bottom: 64px;
    max-width: 1200px;
  }

  .future {
    padding: 40px 48px;
    position: relative;
  }

  .future-wrong {
    background: rgba(220, 38, 38, 0.03);
    border: 1px solid rgba(220, 38, 38, 0.1);
    border-radius: 16px 0 0 16px;
  }
  .future-right {
    background: rgba(59, 130, 246, 0.03);
    border: 1px solid rgba(59, 130, 246, 0.1);
    border-radius: 0 16px 16px 0;
    border-left: none;
  }

  .future-label {
    font-size: 13px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 20px;
  }
  .future-wrong .future-label { color: #ef4444; }
  .future-right .future-label { color: #60a5fa; }

  .future-text {
    font-size: 22px; font-weight: 400; line-height: 1.7;
  }
  .future-wrong .future-text { color: rgba(245, 245, 245, 0.35); text-decoration: line-through; text-decoration-color: rgba(239, 68, 68, 0.3); }
  .future-right .future-text { color: rgba(245, 245, 245, 0.65); }

  .future-text strong {
    font-weight: 700;
  }
  .future-wrong .future-text strong { color: rgba(239, 68, 68, 0.5); }
  .future-right .future-text strong { color: #f5f5f5; }

  /* The single ask */
  .ask {
    display: flex; align-items: center; gap: 24px;
    padding: 32px 40px;
    background: rgba(59, 130, 246, 0.06);
    border: 1px solid rgba(59, 130, 246, 0.15);
    border-radius: 16px;
    max-width: 1200px;
  }

  .ask-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: rgba(59, 130, 246, 0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: #60a5fa; font-weight: 800;
    flex-shrink: 0;
  }

  .ask-text {
    font-size: 22px; font-weight: 500; color: rgba(245, 245, 245, 0.7);
    line-height: 1.6;
  }
  .ask-text strong {
    color: #f5f5f5; font-weight: 700;
  }

  /* Signature line */
  .signature {
    position: absolute; bottom: 48px; left: 140px;
    display: flex; align-items: center; gap: 16px;
  }
  .sig-line {
    width: 40px; height: 2px; background: rgba(59, 130, 246, 0.3);
  }
  .sig-text {
    font-size: 14px; font-weight: 500; color: rgba(245, 245, 245, 0.25);
  }

  .counter {
    position: absolute; bottom: 48px; right: 140px;
    font-size: 14px; color: rgba(245, 245, 245, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="section-label">The Real Question</div>
    <h2>AI를 도입할지 말지가 아닙니다.<br>이미 늦었으니까.</h2>

    <div class="two-futures">
      <div class="future future-wrong">
        <div class="future-label">흔한 실수</div>
        <div class="future-text">
          <strong>"좋은 도구 찾아서 전사 배포"</strong><br>
          도구는 6개월 뒤 바뀝니다.<br>
          배포한 도구에 갇힌 조직만 남습니다.
        </div>
      </div>
      <div class="future future-right">
        <div class="future-label">지속가능한 투자</div>
        <div class="future-text">
          <strong>"AI와 일하는 근육을 키우는 것"</strong><br>
          도구가 바뀌어도 근육은 남습니다.<br>
          그 근육이 조직의 진짜 자산입니다.
        </div>
      </div>
    </div>

    <div class="ask">
      <div class="ask-icon">?</div>
      <div class="ask-text">
        다음 주 월요일, <strong>당신 팀에서 가장 반복적인 업무 하나</strong>를 골라주세요.<br>
        거기서부터 시작합니다.
      </div>
    </div>
  </div>

  <div class="signature">
    <div class="sig-line"></div>
    <span class="sig-text">Presentation generated with Skills-for-Workers</span>
  </div>
  <div class="counter">05 / 05</div>
</body>
</html>
