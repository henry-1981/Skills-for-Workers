<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #07060b;
    position: relative;
  }

  .bg-glow {
    position: absolute; width: 1000px; height: 1000px;
    border-radius: 50%; filter: blur(160px); opacity: 0.15;
    background: radial-gradient(circle, #7c3aed 0%, #ec4899 50%, transparent 80%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }

  .progress { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #7c3aed, #f59e0b, #ec4899); }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center;
    height: 100%; padding: 100px 160px;
  }

  .provocation {
    font-size: 20px; font-weight: 500; color: #f87171;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  h2 {
    font-size: 64px; font-weight: 800; color: #faf5ff;
    line-height: 1.2; letter-spacing: -1.5px;
    margin-bottom: 64px;
    max-width: 1000px;
  }
  h2 em {
    font-style: normal;
    background: linear-gradient(135deg, #a78bfa, #f59e0b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .actions {
    display: flex; flex-direction: column; gap: 28px;
    max-width: 900px;
  }

  .action {
    display: flex; align-items: flex-start; gap: 24px;
  }

  .action-when {
    flex-shrink: 0; width: 100px;
    font-size: 16px; font-weight: 700;
    padding: 6px 16px; border-radius: 8px;
    text-align: center;
  }
  .action:nth-child(1) .action-when { background: rgba(124, 58, 237, 0.15); color: #a78bfa; }
  .action:nth-child(2) .action-when { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
  .action:nth-child(3) .action-when { background: rgba(236, 72, 153, 0.15); color: #f472b6; }

  .action-body {
    flex: 1;
  }

  .action-title {
    font-size: 24px; font-weight: 700; color: #faf5ff;
    margin-bottom: 6px;
  }

  .action-desc {
    font-size: 17px; font-weight: 400; color: rgba(250, 245, 255, 0.45);
    line-height: 1.6;
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: rgba(250, 245, 255, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="progress"></div>

  <div class="content">
    <p class="provocation">경쟁사는 이미 시작했다.</p>
    <h2>당신의 <em>다음 분기</em>는?</h2>

    <div class="actions">
      <div class="action">
        <div class="action-when">월요일</div>
        <div class="action-body">
          <div class="action-title">반복 업무 하나를 에이전트에게 맡겨라</div>
          <div class="action-desc">가장 지루한 일부터 위임하고, 금요일에 결과를 보라. 작게 시작해야 빨리 배운다.</div>
        </div>
      </div>
      <div class="action">
        <div class="action-when">이번 달</div>
        <div class="action-body">
          <div class="action-title">규칙부터 만들어라</div>
          <div class="action-desc">AI 도입 후 거버넌스를 세우는 건, 사고 후 보험을 드는 것과 같다.</div>
        </div>
      </div>
      <div class="action">
        <div class="action-when">이번 분기</div>
        <div class="action-body">
          <div class="action-title">당신만의 데이터를 쌓아라</div>
          <div class="action-desc">범용 AI는 누구나 쓴다. 차이를 만드는 건 당신 도메인의 깊이다.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="counter">05 / 05</div>
</body>
</html>
