<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #07060b;
    position: relative;
  }

  .progress { position: absolute; top: 0; left: 0; width: 60%; height: 3px; background: linear-gradient(90deg, #7c3aed, #f59e0b); }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center;
    height: 100%; padding: 100px 160px;
  }

  .context {
    font-size: 18px; font-weight: 500;
    color: rgba(250, 245, 255, 0.35);
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .hero-number {
    font-size: 200px; font-weight: 900; line-height: 0.9;
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 40%, #ea580c 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }

  .hero-label {
    font-size: 36px; font-weight: 700; color: #faf5ff;
    margin-bottom: 12px;
  }

  .interpretation {
    font-size: 22px; font-weight: 400;
    color: rgba(250, 245, 255, 0.5);
    line-height: 1.7;
    max-width: 700px;
    margin-bottom: 48px;
  }
  .interpretation strong {
    color: #fbbf24; font-weight: 600;
  }

  /* Secondary stats */
  .secondary {
    display: flex; gap: 64px;
  }

  .stat {
    display: flex; flex-direction: column;
  }

  .stat-value {
    font-size: 52px; font-weight: 800; line-height: 1;
    margin-bottom: 8px;
  }
  .stat:nth-child(1) .stat-value { color: #a78bfa; }
  .stat:nth-child(2) .stat-value { color: #f472b6; }

  .stat-label {
    font-size: 16px; font-weight: 500; color: rgba(250, 245, 255, 0.45);
    margin-bottom: 4px;
  }

  .stat-insight {
    font-size: 14px; font-weight: 400; color: rgba(250, 245, 255, 0.3);
    line-height: 1.5;
    max-width: 280px;
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: rgba(250, 245, 255, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="progress"></div>

  <div class="content">
    <p class="context">돈이 몰리는 곳에 미래가 있다</p>
    <div class="hero-number">$298B</div>
    <div class="hero-label">1년 만에 37% 커진 시장</div>
    <p class="interpretation">
      이 속도면 <strong>2028년에 반조 달러를 넘깁니다.</strong><br>
      아직 AI 전략이 없다면, 시장이 기다려주지 않습니다.
    </p>

    <div class="secondary">
      <div class="stat">
        <div class="stat-value">72%</div>
        <div class="stat-label">Fortune 500 AI 도입률</div>
        <div class="stat-insight">2년 전 48%에서 급등 — 나머지 28%가 고립됩니다</div>
      </div>
      <div class="stat">
        <div class="stat-value">4.2M</div>
        <div class="stat-label">신규 AI 채용 공고 (연간)</div>
        <div class="stat-insight">AI가 일자리를 없앤다고? 연간 420만 개가 열리고 있습니다</div>
      </div>
    </div>
  </div>

  <div class="counter">03 / 05</div>
</body>
</html>
