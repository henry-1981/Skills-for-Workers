<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #07060b;
    position: relative;
  }

  .bg-glow {
    position: absolute; width: 1200px; height: 1200px;
    border-radius: 50%; filter: blur(180px); opacity: 0.12;
    background: radial-gradient(circle, #dc2626 0%, #7c3aed 60%, transparent 80%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center;
    height: 100%; padding: 120px 160px;
  }

  .tension {
    font-size: 24px; font-weight: 500;
    color: #f87171;
    letter-spacing: 1px;
    margin-bottom: 40px;
    opacity: 0.9;
  }

  h1 {
    font-size: 88px; font-weight: 800; line-height: 1.1;
    color: #faf5ff;
    letter-spacing: -2px;
    margin-bottom: 40px;
    max-width: 1200px;
  }
  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .bridge {
    font-size: 26px; font-weight: 400;
    color: rgba(250, 245, 255, 0.45);
    line-height: 1.7;
    max-width: 800px;
  }
  .bridge strong {
    color: rgba(250, 245, 255, 0.75);
    font-weight: 600;
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: rgba(250, 245, 255, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="content">
    <p class="tension">당신의 팀은 아직 사람만으로 일하고 있습니까?</p>
    <h1>AI가 지시를 기다리던<br>시대는 <em>끝났다</em></h1>
    <p class="bridge">
      2026년, AI는 스스로 판단하고 실행합니다.<br>
      <strong>5분 뒤, 당신의 업무가 어떻게 바뀌는지</strong> 이야기합니다.
    </p>
  </div>

  <div class="counter">01 / 05</div>
</body>
</html>
