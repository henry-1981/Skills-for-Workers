<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #07060b;
    position: relative;
  }

  .orb {
    position: absolute; border-radius: 50%; filter: blur(130px);
  }
  .orb-1 { width: 600px; height: 600px; background: #f59e0b; top: -100px; right: -50px; opacity: 0.12; }

  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .progress { position: absolute; top: 0; left: 0; width: 50%; height: 3px; background: linear-gradient(90deg, #7c3aed, #f59e0b); }

  /* Rapid-fire remaining trends - using visual hierarchy, not grid */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center;
    height: 100%; padding: 100px 160px;
  }

  .section-label {
    font-size: 14px; font-weight: 500; color: #fbbf24;
    letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 48px;
  }

  .trend-list { display: flex; flex-direction: column; gap: 28px; }

  .trend-item {
    display: flex; align-items: center; gap: 32px;
  }

  .trend-num {
    font-size: 56px; font-weight: 900; line-height: 1;
    width: 100px; flex-shrink: 0; text-align: right;
  }
  .trend-item:nth-child(1) .trend-num { color: rgba(251, 191, 36, 0.5); }
  .trend-item:nth-child(2) .trend-num { color: rgba(244, 114, 182, 0.5); }
  .trend-item:nth-child(3) .trend-num { color: rgba(34, 211, 238, 0.5); }
  .trend-item:nth-child(4) .trend-num { color: rgba(52, 211, 153, 0.5); }

  .trend-divider {
    width: 3px; height: 56px;
    border-radius: 2px; flex-shrink: 0;
  }
  .trend-item:nth-child(1) .trend-divider { background: rgba(251, 191, 36, 0.3); }
  .trend-item:nth-child(2) .trend-divider { background: rgba(244, 114, 182, 0.3); }
  .trend-item:nth-child(3) .trend-divider { background: rgba(34, 211, 238, 0.3); }
  .trend-item:nth-child(4) .trend-divider { background: rgba(52, 211, 153, 0.3); }

  .trend-text { display: flex; flex-direction: column; gap: 4px; }
  .trend-title {
    font-size: 28px; font-weight: 700; color: #faf5ff;
  }
  .trend-desc {
    font-size: 18px; font-weight: 400; color: rgba(250, 245, 255, 0.4);
    line-height: 1.5;
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: rgba(250, 245, 255, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="grid-overlay"></div>
  <div class="progress"></div>

  <div class="content">
    <div class="section-label">Remaining Trends at a Glance</div>

    <div class="trend-list">
      <div class="trend-item">
        <div class="trend-num">02</div>
        <div class="trend-divider"></div>
        <div class="trend-text">
          <div class="trend-title">멀티모달 네이티브</div>
          <div class="trend-desc">텍스트 · 이미지 · 음성 · 코드를 하나의 컨텍스트에서 처리</div>
        </div>
      </div>
      <div class="trend-item">
        <div class="trend-num">03</div>
        <div class="trend-divider"></div>
        <div class="trend-text">
          <div class="trend-title">온디바이스 AI</div>
          <div class="trend-desc">클라우드 없이 동작하는 경량 모델 — 프라이버시와 속도의 균형</div>
        </div>
      </div>
      <div class="trend-item">
        <div class="trend-num">04</div>
        <div class="trend-divider"></div>
        <div class="trend-text">
          <div class="trend-title">AI 거버넌스</div>
          <div class="trend-desc">EU AI Act 시행 — 기업별 내부 정책 수립이 필수 과제로</div>
        </div>
      </div>
      <div class="trend-item">
        <div class="trend-num">05</div>
        <div class="trend-divider"></div>
        <div class="trend-text">
          <div class="trend-title">도메인 특화</div>
          <div class="trend-desc">범용에서 전문으로 — 의료 · 법률 · 금융의 수직 AI</div>
        </div>
      </div>
    </div>
  </div>

  <div class="counter">06 / 10</div>
</body>
</html>
