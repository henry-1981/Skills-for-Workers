<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #07060b;
    position: relative;
  }

  .orb {
    position: absolute; border-radius: 50%; filter: blur(140px);
  }
  .orb-1 { width: 900px; height: 900px; background: #7c3aed; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.15; }
  .orb-2 { width: 400px; height: 400px; background: #f59e0b; bottom: -100px; right: 200px; opacity: 0.1; }
  .orb-3 { width: 300px; height: 300px; background: #ec4899; top: 100px; left: 100px; opacity: 0.08; }

  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .progress { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #7c3aed, #f59e0b, #ec4899); }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    height: 100%; padding: 120px;
    text-align: center;
  }

  .closing-text {
    font-size: 48px; font-weight: 300; color: rgba(250, 245, 255, 0.4);
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }

  .closing-highlight {
    font-size: 72px; font-weight: 800;
    background: linear-gradient(135deg, #faf5ff, #e9d5ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -2px;
    margin-bottom: 64px;
  }

  .cta {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 18px 48px; border-radius: 100px;
    background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(236, 72, 153, 0.2));
    border: 1px solid rgba(124, 58, 237, 0.3);
    color: #e9d5ff; font-size: 22px; font-weight: 600;
    letter-spacing: 0.5px;
  }
  .cta-arrow { font-size: 24px; }

  .accent-line {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 3px;
    background: linear-gradient(90deg, transparent, #a78bfa, transparent);
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: rgba(250, 245, 255, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-overlay"></div>
  <div class="progress"></div>

  <div class="content">
    <div class="closing-text">AI의 미래는 기술이 아닙니다</div>
    <div class="closing-highlight">함께 일하는 방식의 미래입니다</div>
    <div class="cta">다음 단계를 논의합시다 <span class="cta-arrow">→</span></div>
  </div>

  <div class="accent-line"></div>
  <div class="counter">10 / 10</div>
</body>
</html>
