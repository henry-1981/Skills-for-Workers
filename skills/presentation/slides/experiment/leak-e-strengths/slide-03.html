<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #07060b;
    position: relative;
  }

  .orb {
    position: absolute; border-radius: 50%; filter: blur(140px);
  }
  .orb-1 { width: 700px; height: 700px; background: #7c3aed; bottom: -200px; right: 100px; opacity: 0.15; }

  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .progress { position: absolute; top: 0; left: 0; width: 20%; height: 3px; background: linear-gradient(90deg, #7c3aed, #a78bfa); }

  /* Dramatic contrast: two numbers side by side */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    height: 100%; padding: 120px;
    text-align: center;
  }

  .context-label {
    font-size: 16px; font-weight: 500; color: rgba(250, 245, 255, 0.3);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 60px;
  }

  .comparison {
    display: flex; align-items: baseline; gap: 80px;
    margin-bottom: 48px;
  }

  .comp-item { display: flex; flex-direction: column; align-items: center; }

  .comp-number {
    font-size: 160px; font-weight: 900; line-height: 1;
    letter-spacing: -4px;
  }
  .comp-number.dim {
    color: rgba(250, 245, 255, 0.12);
  }
  .comp-number.bright {
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .comp-year {
    font-size: 20px; font-weight: 500; color: rgba(250, 245, 255, 0.3);
    margin-top: 12px;
  }

  .arrow-between {
    font-size: 64px; color: rgba(250, 245, 255, 0.15);
    padding-bottom: 40px;
  }

  .insight {
    font-size: 28px; font-weight: 600; color: #faf5ff;
    margin-bottom: 12px;
  }

  .insight-sub {
    font-size: 20px; font-weight: 400; color: rgba(250, 245, 255, 0.4);
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: rgba(250, 245, 255, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="grid-overlay"></div>
  <div class="progress"></div>

  <div class="content">
    <div class="context-label">Fortune 500 AI Adoption Rate</div>

    <div class="comparison">
      <div class="comp-item">
        <div class="comp-number dim">48%</div>
        <div class="comp-year">2024</div>
      </div>
      <div class="arrow-between">→</div>
      <div class="comp-item">
        <div class="comp-number bright">72%</div>
        <div class="comp-year">2026</div>
      </div>
    </div>

    <div class="insight">2년 만에 과반수 → 압도적 다수로</div>
    <div class="insight-sub">프로덕션 레벨 AI 운영 기업 비율</div>
  </div>

  <div class="counter">03 / 10</div>
</body>
</html>
