<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #07060b;
    position: relative;
  }

  .orb {
    position: absolute; border-radius: 50%; filter: blur(140px);
  }
  .orb-1 { width: 600px; height: 600px; background: #f59e0b; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.12; }

  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .progress { position: absolute; top: 0; left: 0; width: 10%; height: 3px; background: linear-gradient(90deg, #7c3aed, #a78bfa); }

  /* Single giant number - data spotlight technique */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    height: 100%; padding: 120px;
    text-align: center;
  }

  .context-label {
    font-size: 16px; font-weight: 500; color: rgba(250, 245, 255, 0.3);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 40px;
  }

  .giant-number {
    font-size: 220px; font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, #fbbf24, #f59e0b, #ea580c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -8px;
    margin-bottom: 24px;
  }

  .number-label {
    font-size: 36px; font-weight: 600; color: #faf5ff;
    margin-bottom: 16px;
  }

  .number-context {
    font-size: 22px; font-weight: 400; color: rgba(250, 245, 255, 0.4);
    max-width: 600px; line-height: 1.6;
  }

  .change-badge {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 32px; padding: 8px 20px; border-radius: 100px;
    background: rgba(245, 158, 11, 0.12);
    border: 1px solid rgba(245, 158, 11, 0.25);
    font-size: 18px; font-weight: 600; color: #fbbf24;
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: rgba(250, 245, 255, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="grid-overlay"></div>
  <div class="progress"></div>

  <div class="content">
    <div class="context-label">Global AI Market Size · 2026</div>
    <div class="giant-number">$298B</div>
    <div class="number-label">글로벌 AI 시장 규모</div>
    <div class="number-context">소프트웨어 · 하드웨어 · 서비스 포함</div>
    <div class="change-badge">↑ YoY 37% 성장</div>
  </div>

  <div class="counter">02 / 10</div>
</body>
</html>
