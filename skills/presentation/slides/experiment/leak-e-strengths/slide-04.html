<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #07060b;
    position: relative;
  }

  .orb {
    position: absolute; border-radius: 50%; filter: blur(130px);
  }
  .orb-1 { width: 600px; height: 600px; background: #ec4899; top: -150px; right: 200px; opacity: 0.1; }
  .orb-2 { width: 400px; height: 400px; background: #7c3aed; bottom: -100px; left: 300px; opacity: 0.12; }

  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .progress { position: absolute; top: 0; left: 0; width: 30%; height: 3px; background: linear-gradient(90deg, #7c3aed, #ec4899); }

  /* Transition slide - one provocative question */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    height: 100%; padding: 120px 200px;
    text-align: center;
  }

  .question {
    font-size: 72px; font-weight: 800; color: #faf5ff;
    line-height: 1.25; letter-spacing: -2px;
    margin-bottom: 48px;
  }

  .question em {
    font-style: normal;
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub-question {
    font-size: 24px; font-weight: 400; color: rgba(250, 245, 255, 0.35);
    line-height: 1.6;
    max-width: 700px;
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: rgba(250, 245, 255, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="grid-overlay"></div>
  <div class="progress"></div>

  <div class="content">
    <div class="question">그래서, <em>무엇이</em><br>이 변화를 이끄는가?</div>
    <div class="sub-question">시장 규모와 도입률 뒤에 숨은<br>5가지 구조적 전환</div>
  </div>

  <div class="counter">04 / 10</div>
</body>
</html>
