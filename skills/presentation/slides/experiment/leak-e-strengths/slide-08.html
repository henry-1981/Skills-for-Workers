<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #07060b;
    position: relative;
  }

  .orb {
    position: absolute; border-radius: 50%; filter: blur(130px);
  }
  .orb-1 { width: 800px; height: 800px; background: #7c3aed; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.1; }

  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .progress { position: absolute; top: 0; left: 0; width: 70%; height: 3px; background: linear-gradient(90deg, #7c3aed, #a78bfa); }

  /* Pivot/transition slide */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    height: 100%; padding: 120px 200px;
    text-align: center;
  }

  .pivot-text {
    font-size: 64px; font-weight: 800; color: #faf5ff;
    line-height: 1.3; letter-spacing: -1.5px;
    margin-bottom: 24px;
  }

  .pivot-highlight {
    font-size: 64px; font-weight: 800; line-height: 1.3;
    background: linear-gradient(135deg, #a78bfa 0%, #f59e0b 50%, #ec4899 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1.5px;
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: rgba(250, 245, 255, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="grid-overlay"></div>
  <div class="progress"></div>

  <div class="content">
    <div class="pivot-text">AI를 도입하느냐가 아니라</div>
    <div class="pivot-highlight">어떻게 함께 일하느냐의 문제</div>
  </div>

  <div class="counter">08 / 10</div>
</body>
</html>
