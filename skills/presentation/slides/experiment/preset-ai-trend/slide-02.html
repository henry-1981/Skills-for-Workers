<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --bg-primary: #1B2838;
    --bg-gradient-end: #0D1B2A;
    --card-bg: #243447;
    --accent: #4A9BD9;
    --text-primary: #F0F4F8;
    --text-secondary: #8899AA;
    --text-on-card: #F0F4F8;
    --card-fill-0: #243447;
    --card-fill-1: #1E3A5F;
    --card-fill-2: #2C4A6E;
    --card-fill-3: #1B3352;
    --card-fill-4: #345882;
    --card-fill-5: #1B2838;
    --card-accent-0: #4A9BD9;
    --card-accent-1: #5AABEA;
    --card-accent-2: #3A8BC9;
    --font-display: 'Pretendard';
    --font-display-weight: 700;
    --font-body: 'Pretendard';
    --font-body-weight: 400;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: var(--font-body), 'Inter', sans-serif;
    background: linear-gradient(180deg, var(--bg-primary), var(--bg-gradient-end));
    position: relative;
  }

  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(74,155,217,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,155,217,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .progress { position: absolute; top: 0; left: 0; width: 40%; height: 3px; background: var(--accent); }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center;
    height: 100%; padding: 100px 120px 80px;
  }

  .section-label {
    font-size: 14px; font-weight: 500; color: var(--accent);
    letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 16px;
  }

  h2 {
    font-size: 56px; font-weight: var(--font-display-weight); color: var(--text-primary);
    letter-spacing: -1px; margin-bottom: 64px;
  }
  h2 span { color: var(--accent); }

  .trends {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px;
  }

  .trend-card {
    background: var(--card-bg);
    border: 1px solid rgba(74, 155, 217, 0.1);
    border-radius: 16px; padding: 36px 28px;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .trend-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent);
    border-radius: 16px 16px 0 0;
  }

  .trend-num {
    font-size: 48px; font-weight: 800; line-height: 1;
    color: var(--accent); opacity: 0.3;
    margin-bottom: 20px;
  }

  .trend-title {
    font-size: 22px; font-weight: 700; color: var(--text-on-card);
    margin-bottom: 12px; line-height: 1.3;
  }

  .trend-desc {
    font-size: 16px; font-weight: 400; color: var(--text-secondary);
    line-height: 1.6;
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: var(--text-secondary);
    letter-spacing: 4px; opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="progress"></div>

  <div class="content">
    <div class="section-label">Overview</div>
    <h2>2026년을 정의할 <span>5가지 흐름</span></h2>

    <div class="trends">
      <div class="trend-card">
        <div class="trend-num">01</div>
        <div class="trend-title">에이전트 AI</div>
        <div class="trend-desc">자율 실행하는 AI — 생성을 넘어 행동하는 시스템으로 전환</div>
      </div>
      <div class="trend-card">
        <div class="trend-num">02</div>
        <div class="trend-title">멀티모달 네이티브</div>
        <div class="trend-desc">텍스트·이미지·음성·코드를 하나의 컨텍스트에서 처리</div>
      </div>
      <div class="trend-card">
        <div class="trend-num">03</div>
        <div class="trend-title">온디바이스 AI</div>
        <div class="trend-desc">클라우드 없이 동작하는 경량 모델, 프라이버시와 속도의 균형</div>
      </div>
      <div class="trend-card">
        <div class="trend-num">04</div>
        <div class="trend-title">AI 거버넌스</div>
        <div class="trend-desc">EU AI Act 시행, 기업별 내부 정책 수립이 필수 과제로</div>
      </div>
      <div class="trend-card">
        <div class="trend-num">05</div>
        <div class="trend-title">도메인 특화</div>
        <div class="trend-desc">범용에서 전문으로 — 의료·법률·금융 영역의 수직 AI</div>
      </div>
    </div>
  </div>

  <div class="counter">02 / 05</div>
</body>
</html>
