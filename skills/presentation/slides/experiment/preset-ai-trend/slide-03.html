<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --bg-primary: #1B2838;
    --bg-gradient-end: #0D1B2A;
    --card-bg: #243447;
    --accent: #4A9BD9;
    --text-primary: #F0F4F8;
    --text-secondary: #8899AA;
    --text-on-card: #F0F4F8;
    --card-fill-0: #243447;
    --card-fill-1: #1E3A5F;
    --card-fill-2: #2C4A6E;
    --font-display: 'Pretendard';
    --font-display-weight: 700;
    --font-body: 'Pretendard';
    --font-body-weight: 400;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: var(--font-body), 'Inter', sans-serif;
    background: linear-gradient(180deg, var(--bg-primary), var(--bg-gradient-end));
    position: relative;
  }

  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(74,155,217,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,155,217,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .progress { position: absolute; top: 0; left: 0; width: 60%; height: 3px; background: var(--accent); }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center;
    height: 100%; padding: 100px 120px 80px;
  }

  .section-label {
    font-size: 14px; font-weight: 500; color: var(--accent);
    letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 16px;
  }

  h2 {
    font-size: 52px; font-weight: var(--font-display-weight); color: var(--text-primary);
    letter-spacing: -1px; margin-bottom: 60px;
  }

  .kpi-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
  }

  .kpi-card {
    background: var(--card-fill-0);
    border: 1px solid rgba(74, 155, 217, 0.1);
    border-radius: 20px; padding: 48px 40px;
    position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
    background: var(--accent);
  }

  .kpi-value {
    font-size: 72px; font-weight: 800; line-height: 1;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .kpi-label {
    font-size: 20px; font-weight: 600; color: var(--text-on-card);
    margin-bottom: 8px;
  }

  .kpi-sub {
    font-size: 16px; font-weight: 400; color: var(--text-secondary);
    line-height: 1.5;
  }

  .kpi-change {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 16px; padding: 4px 12px; border-radius: 100px;
    font-size: 14px; font-weight: 600;
    background: rgba(74, 155, 217, 0.1);
    color: var(--accent);
  }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: var(--text-secondary);
    letter-spacing: 4px; opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="progress"></div>

  <div class="content">
    <div class="section-label">Market Data</div>
    <h2>숫자로 보는 AI 시장</h2>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-value">$298B</div>
        <div class="kpi-label">글로벌 AI 시장 규모</div>
        <div class="kpi-sub">2026년 예측치 기준<br>소프트웨어·하드웨어·서비스 포함</div>
        <div class="kpi-change">↑ YoY 37%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">72%</div>
        <div class="kpi-label">기업 AI 도입률</div>
        <div class="kpi-sub">Fortune 500 기업 중<br>프로덕션 레벨 AI 운영 비율</div>
        <div class="kpi-change">↑ 2024년 대비 +24%p</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">4.2M</div>
        <div class="kpi-label">AI 직무 수요</div>
        <div class="kpi-sub">전 세계 신규 AI 관련<br>채용 공고 수 (연간)</div>
        <div class="kpi-change">↑ 2.1× vs 2024</div>
      </div>
    </div>
  </div>

  <div class="counter">03 / 05</div>
</body>
</html>
