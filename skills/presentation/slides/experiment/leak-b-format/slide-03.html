<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #07060b;
    position: relative;
  }

  .orb { position: absolute; border-radius: 50%; filter: blur(140px); }
  .orb-1 { width: 700px; height: 700px; background: #f59e0b; top: -200px; right: 200px; opacity: 0.12; }
  .orb-2 { width: 500px; height: 500px; background: #7c3aed; bottom: -100px; left: 100px; opacity: 0.15; }

  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .progress { position: absolute; top: 0; left: 0; width: 60%; height: 3px; background: linear-gradient(90deg, #7c3aed, #f59e0b); }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    height: 100%; padding: 100px 120px 80px;
  }

  /* Slide-optimized: recap anchor from previous slide */
  .recap {
    font-size: 15px; font-weight: 400; color: rgba(250,245,255,0.2);
    margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .recap em { color: #a78bfa; font-style: normal; }

  .section-label {
    font-size: 14px; font-weight: 500; color: #fbbf24;
    letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 16px;
  }

  h2 { font-size: 52px; font-weight: 800; color: #faf5ff; letter-spacing: -1px; margin-bottom: 60px; }

  .kpi-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
    flex: 1; align-content: center;
  }

  .kpi-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px; padding: 48px 40px;
    position: relative; overflow: hidden;
  }
  .kpi-card::after {
    content: ''; position: absolute; top: -50%; right: -50%;
    width: 200px; height: 200px; border-radius: 50%; opacity: 0.08;
  }
  .kpi-card:nth-child(1)::after { background: #7c3aed; }
  .kpi-card:nth-child(2)::after { background: #f59e0b; }
  .kpi-card:nth-child(3)::after { background: #ec4899; }

  .kpi-value { font-size: 72px; font-weight: 800; line-height: 1; margin-bottom: 12px; }
  .kpi-card:nth-child(1) .kpi-value { background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .kpi-card:nth-child(2) .kpi-value { background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .kpi-card:nth-child(3) .kpi-value { background: linear-gradient(135deg, #f472b6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .kpi-label { font-size: 20px; font-weight: 600; color: #faf5ff; margin-bottom: 8px; }
  .kpi-sub { font-size: 16px; font-weight: 400; color: rgba(250, 245, 255, 0.4); line-height: 1.5; }
  .kpi-change {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 16px; padding: 4px 12px; border-radius: 100px;
    font-size: 14px; font-weight: 600;
  }
  .kpi-card:nth-child(1) .kpi-change { background: rgba(124, 58, 237, 0.15); color: #a78bfa; }
  .kpi-card:nth-child(2) .kpi-change { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
  .kpi-card:nth-child(3) .kpi-change { background: rgba(236, 72, 153, 0.15); color: #f472b6; }

  /* Slide-optimized: bottom insight line */
  .insight {
    position: absolute; bottom: 52px; left: 120px; right: 200px;
    font-size: 16px; color: rgba(250,245,255,0.3); line-height: 1.5;
    border-top: 1px solid rgba(250,245,255,0.06);
    padding-top: 16px;
  }
  .insight strong { color: rgba(250,245,255,0.5); }

  .counter {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 14px; color: rgba(250, 245, 255, 0.2);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="grid-overlay"></div>
  <div class="progress"></div>

  <div class="content">
    <div class="recap">앞서 본 <em>5가지 흐름</em>이 만들어낸 시장 규모 →</div>
    <div class="section-label">Market Data</div>
    <h2>숫자로 보는 AI 시장</h2>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-value">$298B</div>
        <div class="kpi-label">글로벌 AI 시장 규모</div>
        <div class="kpi-sub">2026년 예측치 기준<br>소프트웨어·하드웨어·서비스 포함</div>
        <div class="kpi-change">↑ YoY 37%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">72%</div>
        <div class="kpi-label">기업 AI 도입률</div>
        <div class="kpi-sub">Fortune 500 기업 중<br>프로덕션 레벨 AI 운영 비율</div>
        <div class="kpi-change">↑ 2024년 대비 +24%p</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">4.2M</div>
        <div class="kpi-label">AI 직무 수요</div>
        <div class="kpi-sub">전 세계 신규 AI 관련<br>채용 공고 수 (연간)</div>
        <div class="kpi-change">↑ 2.1× vs 2024</div>
      </div>
    </div>
  </div>

  <div class="insight"><strong>핵심:</strong> 모바일 인터넷 확산기(2010-2014)보다 빠른 성장 — "실험"에서 "운영"으로의 전환</div>
  <div class="counter">03 / 05</div>
</body>
</html>
