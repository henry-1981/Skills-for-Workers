<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #f5f5f0;
    position: relative;
    display: flex;
  }

  .left {
    width: 55%; height: 100%;
    background: #0a0a0a;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding: 80px 100px;
    position: relative;
  }

  .left::after {
    content: '01';
    position: absolute; top: 60px; left: 100px;
    font-size: 160px; font-weight: 900;
    color: rgba(255,255,255,0.04);
    line-height: 1;
  }

  .provocation {
    font-size: 18px; font-weight: 600;
    color: #e53e3e; letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  h1 {
    font-size: 96px; font-weight: 900;
    color: #ffffff;
    line-height: 1.0;
    letter-spacing: -4px;
    margin-bottom: 40px;
  }

  h1 span {
    display: block;
    font-size: 220px;
    letter-spacing: -10px;
    line-height: 0.85;
    color: #e53e3e;
  }

  .right {
    width: 45%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 80px 80px 80px 100px;
  }

  .question {
    font-size: 36px; font-weight: 300;
    color: #0a0a0a;
    line-height: 1.6;
    max-width: 520px;
  }

  .question strong {
    font-weight: 800;
    border-bottom: 4px solid #e53e3e;
  }

  .sub {
    margin-top: 48px;
    font-size: 16px; font-weight: 400;
    color: #888;
    line-height: 1.8;
    max-width: 420px;
  }
</style>
</head>
<body>
  <div class="left">
    <p class="provocation">질문 하나</p>
    <h1>왜<span>또?</span></h1>
  </div>

  <div class="right">
    <p class="question">
      세상에 브랜드는 넘치는데,<br>
      당신이 <strong>또 하나 만들어야 하는 이유</strong>가<br>
      있습니까?
    </p>
    <p class="sub">
      2025년 한 해에만 국내 신규 상표 출원 28만 건.<br>
      그중 3년 뒤에 기억되는 건 0.3%.
    </p>
  </div>
</body>
</html>
