<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #0a0a0a;
    color: #f5f5f0;
    position: relative;
    display: flex; flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: #e53e3e;
  }

  .headline {
    font-size: 120px; font-weight: 900;
    letter-spacing: -6px;
    text-align: center;
    line-height: 1.05;
    margin-bottom: 64px;
  }

  .headline em {
    font-style: normal;
    color: #e53e3e;
  }

  .actions {
    display: flex;
    gap: 0;
    width: 80%;
    max-width: 1400px;
  }

  .action {
    flex: 1;
    padding: 48px 40px;
    border-left: 1px solid rgba(255,255,255,0.06);
  }
  .action:first-child { border-left: none; }

  .action-when {
    font-size: 13px; font-weight: 700;
    letter-spacing: 5px; text-transform: uppercase;
    color: #e53e3e;
    margin-bottom: 20px;
  }

  .action-what {
    font-size: 22px; font-weight: 700;
    color: #f5f5f0;
    margin-bottom: 12px;
    line-height: 1.3;
  }

  .action-how {
    font-size: 15px; font-weight: 300;
    color: rgba(245,245,240,0.35);
    line-height: 1.7;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 100px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .bottom-bar .page {
    font-size: 13px; color: #333;
    letter-spacing: 4px;
  }

  .bottom-bar .cta-micro {
    font-size: 14px; font-weight: 600;
    color: #e53e3e;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="top-line"></div>

  <div class="headline">합류하거나,<br><em>구경하거나.</em></div>

  <div class="actions">
    <div class="action">
      <div class="action-when">4월 첫째 주</div>
      <div class="action-what">클로즈드 베타 오픈</div>
      <div class="action-how">초대 코드 300개. 태도 선언문을 쓴 사람만 받는다.</div>
    </div>
    <div class="action">
      <div class="action-when">5월</div>
      <div class="action-what">첫 번째 드롭</div>
      <div class="action-how">커뮤니티가 고른 3가지 태도를 제품으로 만든다.</div>
    </div>
    <div class="action">
      <div class="action-when">6월</div>
      <div class="action-what">퍼블릭 런칭</div>
      <div class="action-how">300명의 이야기가 곧 런칭 캠페인이 된다.</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="page">05 / 05</div>
    <div class="cta-micro">voke.kr</div>
  </div>
</body>
</html>
