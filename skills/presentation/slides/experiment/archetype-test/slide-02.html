<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #0a0a0a;
    color: #f5f5f0;
    position: relative;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    height: 100%;
  }

  .col {
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 80px 48px;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  .col:last-child { border-right: none; }

  .col-label {
    font-size: 13px; font-weight: 700;
    letter-spacing: 5px; text-transform: uppercase;
    color: #666;
    margin-bottom: 40px;
  }

  .col:nth-child(1) .gap-word { color: #e53e3e; }
  .col:nth-child(2) .gap-word { color: #f5f5f0; }
  .col:nth-child(3) .gap-word { color: #e53e3e; }

  .gap-word {
    font-size: 72px; font-weight: 900;
    letter-spacing: -3px;
    line-height: 1.1;
    margin-bottom: 32px;
  }

  .gap-desc {
    font-size: 20px; font-weight: 300;
    color: rgba(245,245,240,0.5);
    line-height: 1.7;
  }

  .gap-desc em {
    font-style: normal;
    color: #f5f5f0;
    font-weight: 600;
  }

  .divider {
    position: absolute;
    bottom: 60px; left: 48px; right: 48px;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  .bottom-note {
    position: absolute;
    bottom: 28px; right: 48px;
    font-size: 13px; color: #444;
    letter-spacing: 2px;
  }

  .page {
    position: absolute;
    bottom: 28px; left: 48px;
    font-size: 13px; color: #444;
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="col">
      <div class="col-label">공백 하나</div>
      <div class="gap-word">말하지<br>않는다</div>
      <p class="gap-desc">
        기존 브랜드들은 <em>기능</em>을 외친다.<br>
        아무도 <em>태도</em>를 보여주지 않는다.
      </p>
    </div>
    <div class="col">
      <div class="col-label">공백 둘</div>
      <div class="gap-word">보이지<br>않는다</div>
      <p class="gap-desc">
        25-34세 소비자의 67%가<br>
        "내 취향을 대변하는 브랜드가 없다"고 답했다.
      </p>
    </div>
    <div class="col">
      <div class="col-label">공백 셋</div>
      <div class="gap-word">연결되지<br>않는다</div>
      <p class="gap-desc">
        제품은 사고 끝. <em>관계</em>는 시작도 안 했다.<br>
        재구매율 평균 12%.
      </p>
    </div>
  </div>
  <div class="divider"></div>
  <div class="page">02 / 05</div>
  <div class="bottom-note">시장의 세 가지 침묵</div>
</body>
</html>
