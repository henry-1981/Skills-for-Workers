<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', 'Inter', sans-serif;
    background: #f5f5f0;
    position: relative;
  }

  .brand-name {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 280px; font-weight: 900;
    letter-spacing: -14px;
    color: #0a0a0a;
    line-height: 1;
    white-space: nowrap;
  }

  .brand-name::after {
    content: '.';
    color: #e53e3e;
  }

  .tagline {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, calc(-50% + 160px));
    font-size: 24px; font-weight: 300;
    color: #666;
    letter-spacing: 12px;
    text-transform: uppercase;
  }

  .corner-tl {
    position: absolute; top: 60px; left: 80px;
    width: 60px; height: 60px;
    border-top: 4px solid #0a0a0a;
    border-left: 4px solid #0a0a0a;
  }

  .corner-br {
    position: absolute; bottom: 60px; right: 80px;
    width: 60px; height: 60px;
    border-bottom: 4px solid #0a0a0a;
    border-right: 4px solid #0a0a0a;
  }

  .manifesto {
    position: absolute;
    bottom: 80px; left: 80px;
    max-width: 500px;
  }

  .manifesto p {
    font-size: 16px; font-weight: 400;
    color: #999;
    line-height: 1.8;
  }

  .manifesto strong {
    color: #0a0a0a;
    font-weight: 700;
  }

  .page {
    position: absolute;
    top: 60px; right: 80px;
    font-size: 13px; color: #bbb;
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="brand-name">VOKE</div>
  <div class="tagline">태도가 브랜드다</div>

  <div class="manifesto">
    <p>
      VOKE는 제품을 팔지 않습니다.<br>
      <strong>당신이 세상에 보여주는 방식</strong>을 만듭니다.<br>
      기능은 복사되지만, 태도는 복사되지 않습니다.
    </p>
  </div>

  <div class="page">03 / 05</div>
</body>
</html>
